<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Wishlist | TechHub
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="bg-[#F8F5F0]">

    <section
    class="
    max-w-7xl
    mx-auto
    px-6
    py-16">

        <div
        class="
        flex
        justify-between
        items-center
        mb-10">

            <h1
            class="
            text-4xl
            font-bold">

                My Wishlist

            </h1>

            <a
            href="index.html"
            class="
            px-5
            py-3
            rounded-xl
            bg-[#8B6B47]
            text-white">

                Back To Store

            </a>

        </div>

        <div
        id="wishlist-grid"
        class="
        grid
        md:grid-cols-2
        lg:grid-cols-3
        gap-6">

        </div>

    </section>

    <script>

        const wishlist =

        JSON.parse(
            localStorage.getItem("wishlist")
        ) || [];

        const grid =
        document.getElementById("wishlist-grid");

        if(wishlist.length === 0){

            grid.innerHTML = `

                <div
                class="
                col-span-full
                text-center
                py-20">

                    <i
                    class="
                    fa-regular
                    fa-heart
                    text-5xl
                    mb-4"></i>

                    <h2
                    class="
                    text-2xl
                    font-semibold">

                        Your wishlist is empty

                    </h2>

                </div>

            `;

        }

        else{

            wishlist.forEach(product => {

                grid.innerHTML += `

                    <div
                    class="
                    bg-white
                    rounded-2xl
                    overflow-hidden
                    shadow">

                        <img
                        src="${product.image}"
                        class="
                        h-60
                        w-full
                        object-cover">

                        <div class="p-5">

                            <h3
                            class="
                            text-xl
                            font-semibold">

                                ${product.name}

                            </h3>

                            <div
                            class="
                            mt-4
                            flex
                            gap-3">

                                <button
                                class="
                                px-4
                                py-2
                                bg-[#8B6B47]
                                text-white
                                rounded-xl">

                                    Add To Cart

                                </button>

                            </div>

                        </div>

                    </div>

                `;

            });

        }

    </script>

</body>

</html>
